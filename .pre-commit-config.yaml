repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^vcpkg\.json$
      - id: trailing-whitespace
  - repo: https://github.com/keith/pre-commit-buildifier
    rev: 8.5.1
    hooks:
      - id: buildifier
      - id: buildifier-lint
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.5
    hooks:
      - id: clang-format
        types_or: [c, c++, header]
